name: E2E run

# Runs the E2E suite against the deployed app (dev.wabicare.com), mints fresh
# auth via the Microsoft CIAM setup project, and publishes the interactive
# dashboard + Gherkin/JUnit reports as artifacts.
#
# Triggers:
#   - workflow_dispatch  — devs click "Run workflow" (choose suite / one feature)
#   - schedule           — nightly regression + fresh dashboard
#   - repository_dispatch (type: app-deployed) — the APP repo fires this after a
#     deploy so E2E runs on every app code change (see e2e/CI.md for the curl).
#
# Requires repo secrets: E2E_LOGIN_EMAIL, E2E_LOGIN_PASSWORD.
# Runs are serialized (one at a time) so concurrent CIAM logins never trip
# Azure AD B2C smart-lockout.

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Which tests to run
        type: choice
        default: full
        options: [full, bespoke, bdd, smoke]
      feature:
        description: 'BDD feature filter (optional, e.g. copay, patient-insurance)'
        required: false
        default: ''
  schedule:
    - cron: '0 6 * * *'   # ~06:00 UTC nightly
  repository_dispatch:
    types: [app-deployed]

concurrency:
  group: wabi-e2e-run
  cancel-in-progress: false   # queue, don't kill an in-flight login

permissions:
  contents: read
  pages: write        # publish the dashboard to GitHub Pages
  id-token: write     # required by actions/deploy-pages
  checks: write       # JUnit results → run summary / checks

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome + system deps (config uses channel "chrome")
        run: npx playwright install --with-deps chrome

      - name: Install xvfb (headed Chrome needs a virtual display)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Write .env (single-quoted so dotenv keeps a trailing "#")
        env:
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
        run: |
          {
            printf "E2E_LOGIN_EMAIL=%s\n" "$E2E_LOGIN_EMAIL"
            printf "E2E_LOGIN_PASSWORD='%s'\n" "$E2E_LOGIN_PASSWORD"
          } > .env

      - name: Authenticate (Microsoft CIAM — setup project)
        run: xvfb-run -a npx playwright test --project=setup --headed

      - name: Select suite
        id: suite
        run: |
          SUITE="${{ github.event.inputs.suite }}"; SUITE="${SUITE:-full}"
          BESPOKE="tests/login.spec.ts tests/patient-intake-rujitha.spec.ts tests/schedule.spec.ts tests/sessions.spec.ts"
          case "$SUITE" in
            smoke)   echo "spec=tests/login.spec.ts" >> "$GITHUB_OUTPUT"; echo "grep=landing page" >> "$GITHUB_OUTPUT" ;;
            bespoke) echo "spec=$BESPOKE" >> "$GITHUB_OUTPUT"; echo "grep=" >> "$GITHUB_OUTPUT" ;;
            bdd)     echo "spec=tests/bdd.spec.ts" >> "$GITHUB_OUTPUT"; echo "grep=" >> "$GITHUB_OUTPUT" ;;
            *)       echo "spec=$BESPOKE tests/bdd.spec.ts" >> "$GITHUB_OUTPUT"; echo "grep=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run E2E (auth already minted → --no-deps)
        env:
          BDD_FEATURE: ${{ github.event.inputs.feature }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/full-run.json
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/junit.xml
        run: |
          ARGS=(--project=chromium --no-deps --headed --reporter=list,json,junit)
          for s in ${{ steps.suite.outputs.spec }}; do ARGS+=("$s"); done
          if [ -n "${{ steps.suite.outputs.grep }}" ]; then ARGS+=(-g "${{ steps.suite.outputs.grep }}"); fi
          echo "Running: playwright test ${ARGS[*]}"
          xvfb-run -a npx playwright test "${ARGS[@]}"

      - name: Build coverage dashboard
        if: always()
        run: node tools/build-dashboard.mjs

      - name: Upload reports (dashboard + Gherkin + Playwright + JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-${{ github.run_number }}
          path: |
            e2e/dashboard
            e2e/gherkin-report
            e2e/playwright-report
            e2e/test-results/junit.xml
          retention-days: 30

      - name: Publish JUnit results to the run summary
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: e2e/test-results/junit.xml
          check_name: E2E results
          require_tests: false

  # Publish the dashboard + Gherkin/Playwright reports to GitHub Pages (a live,
  # always-current URL). Runs even if some tests failed, so the report still
  # updates. One-time setup: Settings → Pages → Source = "GitHub Actions".
  publish-pages:
    needs: e2e
    if: ${{ always() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download the reports artifact
        uses: actions/download-artifact@v4
        with:
          name: e2e-reports-${{ github.run_number }}
          path: site

      - name: Add a landing page linking the reports
        run: |
          cat > site/index.html <<'HTML'
          <!doctype html><meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Wabi E2E Reports</title>
          <style>
            body{font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
                 max-width:640px;margin:8vh auto;padding:0 20px;color:#12203a;background:#f4f6fb}
            @media(prefers-color-scheme:dark){body{background:#0f1420;color:#e6ebf5}}
            a{display:block;padding:14px 16px;margin:10px 0;border-radius:12px;text-decoration:none;
              border:1px solid #ccd;background:#fff;color:inherit}
            @media(prefers-color-scheme:dark){a{background:#161d2e;border-color:#26324d}}
            small{color:#7a8aa8}
          </style>
          <h1>Wabi E2E Reports</h1>
          <p><small>Updated by the latest <code>E2E run</code> workflow.</small></p>
          <a href="dashboard/index.html"><b>Coverage dashboard</b><br><small>Feature → Scenario → Gherkin steps · pass / fail / pending · screenshots</small></a>
          <a href="gherkin-report/index.html"><b>Last run — Gherkin report</b></a>
          <a href="playwright-report/index.html"><b>Last run — Playwright report</b></a>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
