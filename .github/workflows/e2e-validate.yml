name: E2E validate

# Fast gate that runs on every code change to e2e/ — compiles all specs +
# step definitions, enumerates every BDD scenario, and parses all feature files.
# No browser, no login, no dev-environment traffic. Catches broken step
# definitions, TypeScript errors, and malformed Gherkin before anything is run.

on:
  push:
    paths: ['e2e/**', '.github/workflows/e2e-validate.yml']
  pull_request:
    paths: ['e2e/**', '.github/workflows/e2e-validate.yml']
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile specs + step defs and enumerate every scenario
        run: npx playwright test --list

      - name: Parse all feature files (build the coverage dashboard from specs)
        run: node tools/build-dashboard.mjs

      - name: Upload drafted coverage dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-dashboard
          path: e2e/dashboard
          retention-days: 7
